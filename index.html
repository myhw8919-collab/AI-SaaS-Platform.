<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SaaS Platform Master</title>
    <style>
        body { margin: 0; background: #000; color: #00d4ff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        #hologram-stage { position: relative; width: 300px; height: 300px; display: none; } /* Wordt geactiveerd via config */
        .avatar { position: absolute; width: 100px; filter: drop-shadow(0 0 10px #00d4ff); }
        .up { top: 0; left: 100px; transform: rotate(180deg) scaleY(-1); }
        .down { bottom: 0; left: 100px; transform: scaleY(-1); }
        .left { left: 0; top: 100px; transform: rotate(90deg) scaleY(-1); }
        .right { right: 0; top: 100px; transform: rotate(-90deg) scaleY(-1); }
        #status-dashboard { border: 1px solid #00d4ff; padding: 20px; border-radius: 10px; background: rgba(0,212,255,0.05); }
    </style>
</head>
<body>

    <div id="status-dashboard">
        <h2>AI SAAS MASTER DASHBOARD</h2>
        <p id="current-mode">Status: Stand-by</p>
        <p id="ai-thought">AI denkt na over nieuwe trends...</p>
        <button onclick="activateHologram()" style="background:#00d4ff; color:black; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">Activeer Hologram Mode</button>
    </div>

    <div id="hologram-stage">
        <img id="img1" src="" class="avatar up">
        <img id="img2" src="" class="avatar down">
        <img id="img3" src="" class="avatar left">
        <img id="img4" src="" class="avatar right">
    </div>

    <script>
        function activateHologram() {
            document.getElementById('status-dashboard').style.display = 'none';
            document.getElementById('hologram-stage').style.display = 'block';
            // Placeholder afbeelding voor nu
            const demoImg = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZ3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z/3o7TKMGpxPuc95dYpa/giphy.gif";
            document.getElementById('img1').src = demoImg;
            document.getElementById('img2').src = demoImg;
            document.getElementById('img3').src = demoImg;
            document.getElementById('img4').src = demoImg;
        }
    </script>
</body>
</html>
