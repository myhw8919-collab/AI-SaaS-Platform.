<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SaaS All-in-One Master</title>
    <style>
        body { margin: 0; background: #050a10; color: #00d4ff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #main-container { width: 90%; max-width: 600px; padding: 20px; text-align: center; }
        
        /* Input Sectie */
        .input-group { background: rgba(0,212,255,0.1); padding: 20px; border-radius: 15px; border: 1px solid #00d4ff; margin-bottom: 20px; }
        textarea { width: 100%; height: 80px; background: #000; color: #fff; border: 1px solid #00d4ff; border-radius: 8px; padding: 10px; box-sizing: border-box; resize: none; }
        
        /* Knoppen */
        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: #00d4ff; color: #000; }
        .btn-secondary { background: transparent; border: 1px solid #00d4ff; color: #00d4ff; }

        /* Hologram Scherm (Full Screen) */
        #hologram-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 1000; }
        .holo-img { position: absolute; width: 120px; filter: drop-shadow(0 0 15px #00d4ff) brightness(1.3); }
        .up { top: 5%; left: 50%; transform: translateX(-50%) rotate(180deg) scaleY(-1); }
        .down { bottom: 5%; left: 50%; transform: translateX(-50%) scaleY(-1); }
        .left { left: 5%; top: 50%; transform: translateY(-50%) rotate(90deg) scaleY(-1); }
        .right { right: 5%; top: 50%; transform: translateY(-50%) rotate(-90deg) scaleY(-1); }
        .close-btn { position: absolute; top: 20px; right: 20px; color: white; border: 1px solid white; padding: 5px 10px; border-radius: 5px; z-index: 1001; }
    </style>
</head>
<body>

    <div id="main-container">
        <h1>SaaS OS v1.0</h1>
        
        <div class="input-group">
            <h3>Nieuw AI Idee / Opdracht</h3>
            <textarea id="ai-input" placeholder="Typ hier je volgende project (bijv. OCR-scanner of gitaar-tips)..."></textarea>
            <button class="btn btn-primary" onclick="saveIdea()">Verstuur naar AI</button>
        </div>

        <div id="log-box" style="text-align: left; font-size: 0.8em; color: #aaa; margin-bottom: 20px;">
            > Systeem gereed voor invoer...
        </div>

        <button class="btn btn-secondary" onclick="toggleHologram()">Start Hologram Projectie</button>
    </div>

    <div id="hologram-overlay">
        <div class="close-btn" onclick="toggleHologram()">SLUITEN</div>
        <img id="holo-source" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZ3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z/3o7TKMGpxPuc95dYpa/giphy.gif" class="holo-img up">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZ3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z/3o7TKMGpxPuc95dYpa/giphy.gif" class="holo-img down">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZ3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z/3o7TKMGpxPuc95dYpa/giphy.gif" class="holo-img left">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZ3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z/3o7TKMGpxPuc95dYpa/giphy.gif" class="holo-img right">
    </div>

    <script>
        function saveIdea() {
            const input = document.getElementById('ai-input').value;
            const log = document.getElementById('log-box');
            if(input) {
                log.innerHTML += `<br>> Opslaan: "${input}"... Done.`;
                document.getElementById('ai-input').value = '';
                // Hier koppelen we straks de automatische GitHub-update aan
            }
        }

        function toggleHologram() {
            const overlay = document.getElementById('hologram-overlay');
            overlay.style.display = (overlay.style.display === 'block') ? 'none' : 'block';
        }
    </script>
</body>
</html>
