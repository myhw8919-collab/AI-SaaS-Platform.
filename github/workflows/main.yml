name: AI-Update-Robot
on:
  repository_dispatch:
    types: [new-idea]

jobs:
  update-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: AI Processing
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          echo "Robot voert nu uit: ${{ github.event.client_payload.idea }}"
